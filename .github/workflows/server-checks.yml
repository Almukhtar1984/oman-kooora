name: Server Checks

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-checks.yml"

jobs:
  server-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Check model migrations
        working-directory: server
        env:
          MODEL_MIGRATION_BASE_REF: origin/${{ github.base_ref }}
        run: npm run db:check-model-migrations

      - name: Check changed server syntax
        run: |
          files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- server | grep '\.mjs$' || true)
          if [ -n "$files" ]; then
            echo "$files" | xargs node --check
          fi
